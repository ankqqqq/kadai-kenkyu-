<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>自転車事故危険度マップ（CSV版）</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

.panel {
  position:absolute;
  top:10px; left:10px;
  z-index:999;
  background:rgba(20,20,30,0.85);
  color:white;
  padding:12px;
  border-radius:12px;
  width:260px;
}

.risk { font-size:18px; font-weight:bold; }

button {
  width:100%;
  margin-top:8px;
  padding:8px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
}
</style>
</head>

<body>

<div class="panel">
  🚲 自転車事故マップ<br>
  危険度: <span id="risk">--</span><br>
  現在地: <span id="pos">取得中...</span>
  <button onclick="recalc()">再計算</button>
</div>

<div id="map"></div>

<script>
// =======================
// 🗺️ 地図
// =======================
const map = L.map('map').setView([38.26, 140.87], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: "OSM"
}).addTo(map);

// =======================
// 📦 データ
// =======================
let accidentData = [];

// =======================
// 📥 CSV読み込み
// =======================
async function loadCSV() {
  const res = await fetch("jikoopendata.csv");
  const text = await res.text();

  accidentData = parseCSV(text);

  drawPoints();
}

// =======================
// 🔄 CSVパース
// =======================
function parseCSV(csvText) {
  const lines = csvText.trim().split("\n").filter(l => l.trim());
  const dataLines = lines.slice(1);

  const clean = s => s.replace(/\u3000/g, " ").trim();

  return dataLines
    .map((line, i) => {
      const c = line.split(",");

      const party1 = clean(c[18]);
      const party2 = clean(c[20]);

      // 🚲 自転車判定
      const isBike =
        party1.includes("自転車") ||
        party2.includes("自転車");

      if (!isBike) return null;

      return {
        id: i + 1,
        lat: parseFloat(c[1]),
        lon: parseFloat(c[0]),
        type: mapType(clean(c[7]), clean(c[10])),

        meta: {
          party1,
          party2,
          date: c[8]
        }
      };
    })
    .filter(Boolean); // null除去
}
// =======================
// 🚨 タイプ変換
// =======================
function mapType(type, daytime) {
  if (daytime.includes("夜")) return "night_accident";
  if (type.includes("車両相互")) return "car_bike";
  if (type.includes("交差点")) return "intersection";
  if (type.includes("単独") || type.includes("転倒")) return "bike_fall";
  return "car_bike";
}

// =======================
// 📍 描画
// =======================
function drawPoints() {
  accidentData.forEach(a => {
    let color = "red";
    if (a.type === "intersection") color = "orange";
    if (a.type === "night_accident") color = "purple";
    if (a.type === "bike_fall") color = "blue";

    L.circleMarker([a.lat, a.lon], {
      radius: 5,
      color: color
    }).addTo(map)
      .bindPopup(`${a.type}<br>${a.meta.date}`);
  });
}

// =======================
// 📏 距離
// =======================
function distance(lat1, lon1, lat2, lon2) {
  return Math.sqrt((lat1-lat2)**2 + (lon1-lon2)**2) * 111000;
}

// =======================
// ⚠️ 危険度
// =======================
function calcRisk() {
  let score = 0;

  accidentData.forEach(a => {
    const d = distance(userLat, userLon, a.lat, a.lon);

    if (d < 80) score += 25;
    else if (d < 150) score += 15;
    else if (d < 300) score += 5;

    if (a.type === "intersection") score += 10;
    if (a.type === "night_accident") score += 15;
  });

  return Math.min(score, 100);
}

// =======================
// 🎨 UI
// =======================
function updateUI() {
  const risk = calcRisk();
  const el = document.getElementById("risk");

  el.innerText = risk;

  if (risk < 30) el.style.color = "#22c55e";
  else if (risk < 60) el.style.color = "#facc15";
  else el.style.color = "#ef4444";
}

function recalc() {
  updateUI();
}

// =======================
// 📡 GPS
// =======================
let userLat = null;
let userLon = null;
let userMarker = null;

function startGPS() {
  navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    document.getElementById("pos").innerText =
      userLat.toFixed(5) + ", " + userLon.toFixed(5);

    if (!userMarker) {
      userMarker = L.marker([userLat, userLon]).addTo(map)
        .bindPopup("現在地");
    } else {
      userMarker.setLatLng([userLat, userLon]);
    }

    map.setView([userLat, userLon]);
    updateUI();

  }, err => {
    console.log("GPS失敗", err);

    // fallback（仙台駅付近）
    userLat = 38.260;
    userLon = 140.882;
    document.getElementById("pos").innerText = "GPS失敗（モック）";

    updateUI();
  }, {
    enableHighAccuracy: true
  });
}

// =======================
// 🚀 起動
// =======================
loadCSV();
startGPS();

</script>

</body>
</html>
