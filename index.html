// 🚨 表示
accidentData.forEach(a => {
  L.circleMarker([a.lat, a.lon], {
    radius: 6,
    color: "red"
  }).addTo(map).bindPopup(a.type);
});

// 📍 ユーザー位置
let userLat = null;
let userLon = null;
let userMarker = null;

// 📏 距離計算（m）
function distance(lat1, lon1, lat2, lon2) {
  return Math.sqrt((lat1-lat2)**2 + (lon1-lon2)**2) * 111000;
}

// ⚠️ 危険度計算
function calcRisk() {
  let score = 0;

  accidentData.forEach(a => {
    const d = distance(userLat, userLon, a.lat, a.lon);

    // 近いほど危険
    if (d < 80) score += 25;
    else if (d < 150) score += 15;
    else if (d < 300) score += 5;

    // タイプ別補正
    if (a.type === "intersection") score += 10;
    if (a.type === "night_accident") score += 15;
  });

  return Math.min(score, 100);
}

// 🎨 UI更新
function updateUI() {
  const risk = calcRisk();

  const el = document.getElementById("risk");
  el.innerText = risk;

  if (risk < 30) el.style.color = "#22c55e";
  else if (risk < 60) el.style.color = "#facc15";
  else el.style.color = "#ef4444";
}

// 🔄 再計算
function recalc() {
  updateUI();
}

// 📡 GPS取得
if (navigator.geolocation) {
  navigator.geolocation.watchPosition(pos => {
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;

    document.getElementById("pos").innerText =
      userLat.toFixed(5) + ", " + userLon.toFixed(5);

    // マーカー更新
    if (!userMarker) {
      userMarker = L.marker([userLat, userLon]).addTo(map)
        .bindPopup("あなた");
    } else {
      userMarker.setLatLng([userLat, userLon]);
    }

    map.setView([userLat, userLon]);

    updateUI();

  }, err => {
    console.log("GPS error", err);

    // fallback（東京固定）
    userLat = 35.700;
    userLon = 139.705;
    document.getElementById("pos").innerText = "GPS失敗（モック）";
    updateUI();
  });
}

function startGPS() {
  if (!navigator.geolocation) {
    alert("GPS非対応ブラウザ");
    return;
  }

  navigator.geolocation.watchPosition(
    (pos) => {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;

      document.getElementById("pos").innerText =
        userLat.toFixed(5) + ", " + userLon.toFixed(5);

      console.log("GPS OK:", userLat, userLon);

      // マーカー更新
      if (!userMarker) {
        userMarker = L.marker([userLat, userLon]).addTo(map)
          .bindPopup("あなたの現在地");
      } else {
        userMarker.setLatLng([userLat, userLon]);
      }

      map.setView([userLat, userLon]);

      updateUI();
    },

    (err) => {
      console.error("GPS失敗:", err);

      document.getElementById("pos").innerText =
        "GPS失敗（権限 or HTTPS問題）";

      // fallback（テスト用）
      userLat = 35.700;
      userLon = 139.705;

      updateUI();
    },

    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 0
    }
  );
}

startGPS();
